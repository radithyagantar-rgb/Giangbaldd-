<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Giang</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
overflow:hidden;
font-family:'Playfair Display',serif;
color:white;
}

canvas{
position:absolute;
top:0;
left:0;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.name{
font-size:70px;
font-weight:700;

background:linear-gradient(45deg,#ff4da6,#ff8ad4,#ffc1e3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

letter-spacing:3px;

text-shadow:
0 0 10px rgba(255,77,166,0.5),
0 0 30px rgba(255,77,166,0.4);

cursor:pointer;

animation:glow 3s infinite;
}

.subtitle{
margin-top:10px;
font-size:18px;
color:#ccc;
letter-spacing:3px;
}

@keyframes glow{
0%{filter:brightness(1)}
50%{filter:brightness(1.4)}
100%{filter:brightness(1)}
}

#secretMsg{
position:fixed;
top:60%;
left:50%;
transform:translate(-50%,-50%);
font-size:26px;
color:#ff4da6;
opacity:0;
transition:0.6s;
}

.heartDrop{
position:fixed;
top:-20px;
font-size:20px;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="center">
<div class="name" id="giangName">Giang ❤️</div>
<div class="subtitle">you are my favorite place</div>
</div>

<div id="secretMsg">giang bald 😝</div>

<canvas id="heart"></canvas>

<!-- MUSIC -->
<iframe
src="https://www.youtube.com/embed/mEveOIoiHg4?autoplay=1&loop=1&playlist=mEveOIoiHg4&controls=0"
width="0"
height="0"
allow="autoplay">
</iframe>

<script>

const canvas=document.getElementById("heart");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function heart(t){
return{
x:16*Math.pow(Math.sin(t),3),
y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
};
}

for(let i=0;i<700;i++){

let t=Math.random()*Math.PI*2;
let h=heart(t);

particles.push({
x:canvas.width/2 + h.x*20,
y:canvas.height/2 - h.y*20,
size:Math.random()*2
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#ff4da6";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

});

requestAnimationFrame(draw);

}

draw();

let clicks=0;

document.getElementById("giangName").onclick=function(){

clicks++;

if(clicks==5){

document.getElementById("secretMsg").style.opacity=1;

for(let i=0;i<25;i++){

let heart=document.createElement("div");
heart.className="heartDrop";
heart.innerText="❤️";

heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

}

}

}

</script>

</body>
</html>
