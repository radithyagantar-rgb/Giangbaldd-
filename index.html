<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Giang ❤️</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

.word{
position:absolute;
color:#ff69b4;
font-size:14px;
white-space:nowrap;
}

#name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:55px;
color:#ff4da6;
font-weight:bold;
text-shadow:0 0 25px pink;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

</style>
</head>

<body>

<div id="name">Giang ❤️</div>

<!-- MUSIC -->
<iframe
src="https://www.youtube.com/embed/mEveOIoiHg4?autoplay=1&loop=1&playlist=mEveOIoiHg4&controls=0"
width="0"
height="0"
allow="autoplay">
</iframe>

<script>

const text="I Love You";
const total=200;
let particles=[];

function heart(t){
return {
x:16*Math.pow(Math.sin(t),3),
y:13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)
};
}

for(let i=0;i<total;i++){

let el=document.createElement("div");
el.className="word";
el.innerText=text;
document.body.appendChild(el);

particles.push({
el:el,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight
});

}

let time=0;

function animate(){

time+=0.01;

particles.forEach((p,i)=>{

let t=i/total*Math.PI*2;
let h=heart(t);

let targetX=window.innerWidth/2 + h.x*20;
let targetY=window.innerHeight/2 - h.y*20;

p.x += (targetX - p.x)*0.05;
p.y += (targetY - p.y)*0.05;

p.el.style.left=p.x+"px";
p.el.style.top=p.y+"px";

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
