<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Giang Bald😜</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

span{
position:absolute;
color:#ff69b4;
font-size:14px;
white-space:nowrap;
}

#name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#ff4da6;
font-weight:bold;
text-shadow:0 0 25px pink;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

#music{
position:fixed;
bottom:10px;
left:10px;
opacity:0.2;
}

</style>
</head>

<body>

<div id="name">Giang ❤️</div>

<div id="music">
<iframe width="300" height="170"
src="https://www.youtube.com/embed/B7Y4LHbpXv0?autoplay=1&loop=1&playlist=B7Y4LHbpXv0"
frameborder="0"
allow="autoplay">
</iframe>
</div>

<script>

const text = "I Love You";
const amount = 160;
let spans = [];

for(let i=0;i<amount;i++){

let s=document.createElement("span");
s.innerText=text;

document.body.appendChild(s);
spans.push(s);

}

let t=0;

function animate(){

t+=0.02;

spans.forEach((span,i)=>{

let angle=i/amount*Math.PI*2;

let x=16*Math.pow(Math.sin(angle),3);
let y=13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle);

let scale=18+Math.sin(t)*6;

span.style.left=(window.innerWidth/2 + x*scale)+"px";
span.style.top=(window.innerHeight/2 - y*scale)+"px";

});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
