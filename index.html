<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Giang ❤️</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

.word{
position:absolute;
color:#ff69b4;
font-size:14px;
white-space:nowrap;
}

#name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:50px;
color:#ff4da6;
font-weight:bold;
text-shadow:0 0 25px pink;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.25);}
100%{transform:translate(-50%,-50%) scale(1);}
}
</style>

</head>

<body>

<div id="name">Giang ❤️</div>

<!-- MUSIC -->
<iframe
src="https://www.youtube.com/embed/mEveOIoiHg4?autoplay=1&loop=1&playlist=mEveOIoiHg4&controls=0"
width="0"
height="0"
frameborder="0"
allow="autoplay">
</iframe>

<script>

const text="I Love You";
const total=180;
let elements=[];

for(let i=0;i<total;i++){

let span=document.createElement("div");
span.className="word";
span.innerText=text;

document.body.appendChild(span);
elements.push(span);

}

let t=0;

function animate(){

t+=0.03;

elements.forEach((el,i)=>{

let angle=i/total*Math.PI*2;

let x=16*Math.pow(Math.sin(angle),3);
let y=13*Math.cos(angle)-5*Math.cos(2*angle)-2*Math.cos(3*angle)-Math.cos(4*angle);

let scale=18+Math.sin(t)*6;

el.style.left=(window.innerWidth/2 + x*scale)+"px";
el.style.top=(window.innerHeight/2 - y*scale)+"px";

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
